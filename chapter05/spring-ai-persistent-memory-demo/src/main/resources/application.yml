spring:
  application:
    name: spring-ai-persistent-memory-demo
  datasource:
    url: ${APP_DATASOURCE_URL:jdbc:h2:mem:spring_ai_memory;MODE=PostgreSQL;DB_CLOSE_DELAY=-1}
    username: ${APP_DATASOURCE_USERNAME:sa}
    password: ${APP_DATASOURCE_PASSWORD:}
    driver-class-name: ${APP_DATASOURCE_DRIVER:org.h2.Driver}
  ai:
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: ${SPRING_AI_CHAT_MEMORY_INITIALIZE_SCHEMA:always}
            schema: ${SPRING_AI_CHAT_MEMORY_SCHEMA:classpath:db/spring-ai-chat-memory-h2.sql}
            platform: ${SPRING_AI_CHAT_MEMORY_PLATFORM:h2}

app:
  ai:
    default-provider: ${APP_AI_DEFAULT_PROVIDER:deepseek}

    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      model: ${DEEPSEEK_MODEL:deepseek-chat}

    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model: ${OLLAMA_MODEL:qwen3.5:9b}

    chatgpt:
      api-key: ${CHATGPT_API_KEY:${OPENAI_API_KEY:}}
      base-url: ${CHATGPT_BASE_URL:https://api.openai.com}
      model: ${CHATGPT_MODEL:gpt-4o-mini}
