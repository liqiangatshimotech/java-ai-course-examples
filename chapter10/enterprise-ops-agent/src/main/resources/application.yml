spring:
  application:
    name: enterprise-ops-agent
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:${MYSQL_PORT:3307}/enterprise_ops_agent?useUnicode=true&characterEncoding=utf8&connectionTimeZone=UTC&forceConnectionTimeZoneToSession=true}
    username: ${MYSQL_USERNAME:ops_agent}
    password: ${MYSQL_PASSWORD:ops_agent_123}
    hikari:
      pool-name: enterprise-ops-agent-pool
      maximum-pool-size: ${MYSQL_POOL_SIZE:5}
      connection-timeout: 3000

server:
  port: ${SERVER_PORT:8080}

ops:
  ai:
    # 默认使用 DeepSeek。也可以通过 AI_PROVIDER=ollama 或 AI_PROVIDER=chatgpt 切换。
    provider: ${AI_PROVIDER:deepseek}
  storage:
    # 默认使用 MySQL，更接近企业项目；测试或临时演示可设置 OPS_STORAGE=memory。
    type: ${OPS_STORAGE:mysql}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true
