server:
  port: 8082

spring:
  application:
    name: spring-ai-mcp-server-demo
  ai:
    mcp:
      server:
        name: commerce-mcp-server
        version: 0.1.0
        type: SYNC
        protocol: STREAMABLE
        instructions: "Expose safe customer-support tools, refund policy resources, and reusable prompts."
        annotation-scanner:
          enabled: true
        capabilities:
          tool: true
          resource: true
          prompt: true
          completion: false
        streamable-http:
          mcp-endpoint: /mcp
